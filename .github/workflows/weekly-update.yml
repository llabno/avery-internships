name: Weekly Internship Update

on:
  schedule:
    # Every Monday at 8:00 AM UTC (2:00 AM Chicago time)
    - cron: '0 8 * * 1'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper and merge
        run: python update_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Chicago Audio Internships.json" "Chicago Audio Internships.csv" \
                  internships_linkedin.json internships_linkedin.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update internship data $(date +%Y-%m-%d)"
            git push
          fi
